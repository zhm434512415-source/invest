
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="referrer" content="always">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="投资记录">
  <meta id="theme-color-meta" name="theme-color" content="#f2f2f7">
  <title>投资记录 iOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            ios: {
              light: '#f2f2f7',
              dark: '#000000',
              cardLight: '#ffffff',
              cardDark: '#1c1c1e',
              blue: '#007aff',
            }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    
    :root {
      --bg-color: #f2f2f7;
      --nav-bg: rgba(255, 255, 255, 0.8);
      --text-main: #000000;
      --text-secondary: #3a3a3c;
      --text-tertiary: #636366;
    }

    .dark {
      --bg-color: #000000;
      --nav-bg: rgba(0, 0, 0, 0.8);
      --text-main: #ffffff;
      --text-secondary: #aeaeb2;
      --text-tertiary: #636366;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-main);
      transition: background-color 0.3s ease;
      overflow: hidden;
      /* 修复 PWA 在 iPhone 上的高度抖动 */
      height: 100vh;
      height: -webkit-fill-available;
    }

    .ios-blur {
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      background-color: var(--nav-bg);
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* 增强型安全区域适配 */
    .safe-top {
      padding-top: env(safe-area-inset-top, 44px);
    }
    .safe-bottom {
      padding-bottom: env(safe-area-inset-bottom, 34px);
    }

    .text-main { color: var(--text-main); }
    .text-secondary { color: var(--text-secondary); }
    .text-tertiary { color: var(--text-tertiary); }
  </style>
<script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@0.562.0?deps=react@19.2.3",
    "react": "https://esm.sh/react@19.2.3",
    "react/": "https://esm.sh/react@19.2.3/",
    "react-dom": "https://esm.sh/react-dom@19.2.3",
    "react-dom/client": "https://esm.sh/react-dom@19.2.3/client?deps=react@19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
<script type="module" src="index.tsx"></script>
</head>
<body class="transition-colors duration-500">
  <div id="root"></div>
</body>
</html>
